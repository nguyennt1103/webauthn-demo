name: dispatch

on:
  workflow_run:
    workflows:
      - ci
    types:
      - completed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dispatch:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Repository Dispatch
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.PAT }}
          repository: nguyennt1103/ansible-hosts
          event-type: delivery
          client-payload: '{
            "image": "ghcr.io/${{ github.repository }}",
            "version": "${{ github.sha }}",
            "app_vars_path": "roles/webauthn-demo/defaults/main.yaml"
          }'
