<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}">
    <script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js}"></script>
    <title>Sign in</title>
</head>
<body>
<div class="container">
    <div class="row">
        <div th:replace="~{fragments/webauthn/pop-up :: pop-up}"></div>
        <div class="col-md-6 mx-auto">
            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input id="username" name="username" class="form-control">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" name="password" id="password" class="form-control">
                </div>
                <div class="d-flex gap-3">
                    <button type="submit" class="btn btn-primary">Sign in</button>
                    <button type="button" id="authenticate" class="btn btn-primary">Passkey</button>
                </div>
            </form>
        </div>
    </div>
</div>
<script type="module" th:src="@{/js/webauthn/authenticate.js}"></script>
</body>
</html>
